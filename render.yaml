services:
  - type: web
    name: top-bottom-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: FRONTEND_URL
        value: https://top-bottom-dashboard.vercel.app
      - key: DATABASE_URL
        value: sqlite:///./trading.db
